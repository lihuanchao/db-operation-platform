version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: dbop-backend
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:////app/arch/db.sqlite3
    ports:
      - "5000:5000"
    volumes:
      - backend_data:/app/arch
      - ./backend:/app/backend:ro
    depends_on:
      - mysql

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: dbop-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

  mysql:
    image: mysql:8.0
    container_name: dbop-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=dbop
      - MYSQL_USER=dbop_user
      - MYSQL_PASSWORD=dbop_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data:/docker-entrypoint-initdb.d:ro
    command: --default-authentication-plugin=mysql_native_password

  # 可选：添加 phpMyAdmin 用于数据库管理
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: dbop-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=mysql
      - MYSQL_ROOT_PASSWORD=root
    depends_on:
      - mysql

volumes:
  backend_data:
  mysql_data:

networks:
  default:
    name: dbop-network
    driver: bridge

# 使用 .env 文件覆盖环境变量
env_file:
  - .env
