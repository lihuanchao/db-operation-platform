services:
  backend:
    image: ${BACKEND_IMAGE:-dbop/backend:local}
    restart: unless-stopped
    env_file:
      - ${BACKEND_ENV_FILE:-./backend/.env}
    environment:
      FLASK_ENV: production
      TZ: ${TZ:-Asia/Shanghai}
      PORT: 5000
      RUN_DB_INIT: ${RUN_DB_INIT:-1}
      DB_WAIT_TIMEOUT: ${DB_WAIT_TIMEOUT:-60}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-1}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    expose:
      - "5000"
    volumes:
      - backend_runtime:/app/arch
      - flashback_runtime:/app/flashback
      # Optional: mount my2sql if flashback is enabled in production.
      # - /opt/dbop/bin/my2sql:/my2sql:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app_network

  frontend:
    image: ${FRONTEND_IMAGE:-dbop/frontend:local}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
    networks:
      - app_network

volumes:
  backend_runtime:
  flashback_runtime:

networks:
  app_network:
    name: ${APP_NETWORK_NAME:-dbop-prod-network}
    driver: bridge
