name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # 后端检查
  backend-check:
    name: Backend - Lint and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ env.PYTHON_VERSION }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m venv venv
        source venv/bin/activate
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest

    - name: Lint with flake8
      run: |
        source venv/bin/activate
        flake8 --max-line-length=120 --ignore=E501,W503,E722,W605,E127,E128 .

    - name: Run tests
      run: |
        source venv/bin/activate
        echo "Running backend tests..."
        # 当有测试文件时取消注释
        # pytest tests/ -v

  # 前端检查
  frontend-check:
    name: Frontend - Lint and Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: ./frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: |
        echo "Checking for lint scripts..."
        if grep -q '"lint"' package.json; then
          npm run lint
        else
          echo "No lint script found, skipping"
        fi

    - name: Build
      run: npm run build

  # Docker 构建
  docker-build:
    name: Docker - Build and Push
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.backend
        push: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/dbop-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/dbop-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build frontend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: Dockerfile.frontend
        push: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/dbop-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/dbop-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 部署（可选）
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && ${{ secrets.DEPLOY_KEY != '' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          cd /path/to/project
          docker-compose pull
          docker-compose up -d
          docker system prune -f
