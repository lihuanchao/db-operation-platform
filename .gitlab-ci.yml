image: docker:24

services:
  - docker:24-dind

stages:
  - test
  - build
  - deploy

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

# 后端检查
backend-test:
  stage: test
  image: python:${PYTHON_VERSION}
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  before_script:
    - cd backend
    - python -m venv venv
    - source venv/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install flake8 pytest
  script:
    - flake8 --max-line-length=120 --ignore=E501,W503,E722,W605,E127,E128 .
    - echo "Running backend tests..."
    # 当有测试文件时取消注释
    # pytest tests/ -v

# 前端检查
frontend-test:
  stage: test
  image: node:${NODE_VERSION}-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  cache:
    paths:
      - frontend/node_modules/
  before_script:
    - cd frontend
    - npm ci
  script:
    - echo "Checking for lint scripts..."
    - if grep -q '"lint"' package.json; then npm run lint; fi
    - npm run build

# 构建 Docker 镜像
docker-build:
  stage: build
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f Dockerfile.backend -t $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE/backend:latest .
    - docker build -f Dockerfile.frontend -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA -t $CI_REGISTRY_IMAGE/frontend:latest .
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/backend:latest
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE/frontend:latest

# 部署（可选）
deploy:
  stage: deploy
  image: alpine:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $DEPLOY_KEY != ""
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $SSH_HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    - ssh $SSH_USER@$SSH_HOST "cd $DEPLOY_PATH && docker-compose pull && docker-compose up -d && docker system prune -f"
